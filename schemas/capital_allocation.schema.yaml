# Machine-readable rendering of system/ENGINE_INTERFACE_CONTRACT.md §13.
# Non-authoritative: if this ever disagrees with that document, the
# Markdown document wins and this file is a bug. See schemas/README.md.
# schema_version bumped 1.0.0 -> 1.1.0: decision expanded from Deploy|Wait
# to Deploy|Rotate|Reserve Cash|Wait, and shares/source_ticker were added
# once this engine took over new-position sizing from
# PORTFOLIO_OPTIMIZATION_ENGINE.md — a field/enum retyping per §1A's rule.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "trx://schemas/capital_allocation.schema.yaml"
title: TRX Capital Allocation Engine Output
oneOf:
  - $ref: "#/$defs/success"
  - $ref: "#/$defs/failure"

$defs:
  failure:
    type: object
    additionalProperties: false
    required: [engine, engine_version, schema_version, failure_state]
    properties:
      engine: { const: "CAPITAL_ALLOCATION_ENGINE" }
      engine_version: { type: string }
      schema_version: { const: "1.1.0" }
      failure_state:
        type: object
        additionalProperties: false
        required: [category, reason]
        properties:
          category:
            type: string
            enum: [DATA_FAILURE, MODEL_FAILURE, CONFLICT_FAILURE, RISK_REJECTION, EXECUTION_INVALID, SYSTEM_ERROR]
          reason: { type: string }

  success:
    type: object
    additionalProperties: false
    required:
      - engine
      - engine_version
      - schema_version
      - decision
      - destination_ticker
      - source_ticker
      - shares
      - amount
      - wait_category
      - reason
      - status
    properties:
      engine: { const: "CAPITAL_ALLOCATION_ENGINE" }
      engine_version: { type: string }
      schema_version: { const: "1.1.0" }
      decision:
        type: string
        enum: [Deploy, Rotate, "Reserve Cash", Wait]
      destination_ticker:
        type: [string, "null"]
        description: "The same-run EXECUTE candidate if Deploy/Rotate; null otherwise."
      source_ticker:
        type: [string, "null"]
        description: "The releasing REDUCE/EXIT ticker, if Rotate; null otherwise. Deploy never sets this (its capital source is general buying power, not a specific same-run release)."
      shares:
        type: [number, "null"]
        description: "Computed per CAPITAL_ALLOCATION_ENGINE.md §5, never exceeding the Risk Engine-approved size for the destination candidate. null unless Deploy/Rotate."
      amount: { type: number }
      wait_category:
        type: [string, "null"]
        enum: ["Reserve for Earnings", "Reserve for Volatility", "Wait for Better Setup", null]
        description: "One of PORTFOLIO_ENGINE.md §16's remaining categories if Wait; null otherwise. Reserve Cash's purpose (building the INVESTMENT_POLICY.md §4 reserve) is stated in reason instead of a sub-category."
      reason: { type: string }
      status:
        type: string
        enum: ["READY", "CAPITAL ALLOCATION INCOMPLETE — DATA REQUIRED"]
