# Machine-readable rendering of system/ENGINE_INTERFACE_CONTRACT.md §9.
# Non-authoritative: if this ever disagrees with that document, the
# Markdown document wins and this file is a bug. See schemas/README.md.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "trx://schemas/committee.schema.yaml"
title: TRX Committee Engine Output
oneOf:
  - $ref: "#/$defs/success"
  - $ref: "#/$defs/failure"

$defs:
  failure:
    type: object
    additionalProperties: false
    required: [engine, engine_version, schema_version, failure_state]
    properties:
      engine: { const: "COMMITTEE_ENGINE" }
      engine_version: { type: string }
      schema_version: { const: "1.0.0" }
      failure_state:
        type: object
        additionalProperties: false
        required: [category, reason]
        properties:
          category:
            type: string
            enum: [DATA_FAILURE, MODEL_FAILURE, CONFLICT_FAILURE, RISK_REJECTION, EXECUTION_INVALID, SYSTEM_ERROR]
          reason: { type: string }

  success:
    type: object
    additionalProperties: false
    required: [engine, engine_version, schema_version, ticker, votes, consensus_score, consensus_label, risk_manager_forced_escalation]
    properties:
      engine: { const: "COMMITTEE_ENGINE" }
      engine_version: { type: string }
      schema_version: { const: "1.0.0" }
      ticker: { type: string }
      votes:
        type: array
        minItems: 6
        maxItems: 6
        items:
          type: object
          additionalProperties: false
          required: [role, vote, confidence, concern]
          properties:
            role:
              type: string
              enum: ["Chief Market Strategist", "Technical Analyst", "Portfolio Manager", "Risk Manager", "Options Specialist", "Execution Specialist"]
            vote:
              type: string
              enum: ["STRONG BUY", "BUY", "WATCH", "PASS", "REDUCE", "REJECT"]
            confidence:
              type: string
              enum: [High, Medium, Low]
              description: "Member's own qualitative self-rating, per §9 — distinct from MASTER_DECISION_ENGINE.md §7's numeric Confidence Model."
            concern: { type: string }
      consensus_score: { type: number, minimum: 0, maximum: 100 }
      consensus_label:
        type: string
        enum: ["Unanimous", "Strong Consensus", "Moderate Consensus", "Weak Consensus", "No Consensus"]
      risk_manager_forced_escalation:
        type: boolean
        description: "true if Risk Manager voted REDUCE or REJECT, per §12"
